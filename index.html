<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amila Vajira | Portfolio</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

        * {
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        /* ===== NEW COLOR PALETTE ===== */
        :root {
            /* Dark Mode - Cyber Tech */
            --bg-primary: #080c16;
            --bg-secondary: #0c1428;
            --bg-card: rgba(16, 24, 48, 0.80);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --text-light: #f1f5f9;
            --border-color: rgba(0, 212, 255, 0.12);
            --glass-bg: rgba(16, 24, 48, 0.80);
            --glass-border: rgba(0, 212, 255, 0.15);
            --shadow: rgba(0, 212, 255, 0.08);
            --accent-primary: #00d4ff;
            --accent-secondary: #7c3aed;
            --transition: all 0.3s ease;
        }

        /* Light Mode */
        [data-theme="light"] {
            --bg-primary: #f0f4f8;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.92);
            --text-primary: #0f172a;
            --text-secondary: #1e293b;
            --text-muted: #475569;
            --text-light: #0f172a;
            --border-color: rgba(2, 132, 199, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.92);
            --glass-border: rgba(2, 132, 199, 0.15);
            --shadow: rgba(0, 0, 0, 0.06);
            --accent-primary: #0284c7;
            --accent-secondary: #6d28d9;
        }

        /* Global Styles */
        body {
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
            font-weight: 400;
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 600;
        }

        /* Gradient Background */
        .gradient-bg {
            background: radial-gradient(circle at 10% 20%, rgba(0, 212, 255, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(124, 58, 237, 0.06) 0%, transparent 50%),
                var(--bg-primary);
            transition: var(--transition);
        }

        /* Light Mode - Force Background */
        [data-theme="light"] .gradient-bg {
            background: radial-gradient(circle at 10% 20%, rgba(2, 132, 199, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(109, 40, 217, 0.05) 0%, transparent 50%),
                var(--bg-primary) !important;
        }

        /* Glass Effect */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            transition: var(--transition);
        }

        .glass-nav {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            transition: var(--transition);
        }

        /* Gradient Text - New Colors */
        .hero-gradient-text {
            background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 60%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        [data-theme="light"] .hero-gradient-text {
            background: linear-gradient(135deg, #0284c7 0%, #6d28d9 60%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Light Mode - Force Text Dark */
        [data-theme="light"] .text-white,
        [data-theme="light"] .text-white\/\[0\.6\],
        [data-theme="light"] .text-white\/\[0\.8\],
        [data-theme="light"] .text-white\/\[0\.2\],
        [data-theme="light"] .text-white\/60,
        [data-theme="light"] .text-white\/80,
        [data-theme="light"] .text-white\/20 {
            color: #0f172a !important;
        }

        [data-theme="light"] .hero-text-white {
            color: #0f172a !important;
        }

        [data-theme="light"] .text-white\/60 {
            color: #475569 !important;
        }

        [data-theme="light"] .text-gray-300 {
            color: #334155 !important;
        }
        [data-theme="light"] .text-gray-400 {
            color: #475569 !important;
        }
        [data-theme="light"] .text-gray-500 {
            color: #64748b !important;
        }

        /* Light Mode - Accent Colors */
        [data-theme="light"] .text-cyan-300 {
            color: #0284c7 !important;
        }
        [data-theme="light"] .text-cyan-400 {
            color: #0284c7 !important;
        }
        [data-theme="light"] .border-cyan-500\/20 {
            border-color: rgba(2, 132, 199, 0.2) !important;
        }
        [data-theme="light"] .bg-cyan-500\/10 {
            background: rgba(2, 132, 199, 0.08) !important;
        }
        [data-theme="light"] .text-cyan-400 {
            color: #0284c7 !important;
        }

        /* Light Mode - Glass */
        [data-theme="light"] .glass {
            background: rgba(255, 255, 255, 0.92) !important;
            border: 1px solid rgba(2, 132, 199, 0.12) !important;
        }
        [data-theme="light"] .glass-nav {
            background: rgba(255, 255, 255, 0.92) !important;
            border-bottom: 1px solid rgba(2, 132, 199, 0.10) !important;
        }

        /* Light Mode - Cards */
        [data-theme="light"] .project-card {
            background: rgba(255, 255, 255, 0.92) !important;
            border: 1px solid rgba(2, 132, 199, 0.10) !important;
        }
        [data-theme="light"] .project-card h3 {
            color: #0f172a !important;
        }
        [data-theme="light"] .project-card p {
            color: #1e293b !important;
        }
        [data-theme="light"] .project-card .text-gray-400 {
            color: #475569 !important;
        }
        [data-theme="light"] .project-card .text-gray-500 {
            color: #64748b !important;
        }
        [data-theme="light"] .project-card .border-t {
            border-color: rgba(2, 132, 199, 0.10) !important;
        }
        [data-theme="light"] .project-card .text-cyan-400 {
            color: #0284c7 !important;
        }

        /* Light Mode - Social Icons */
        [data-theme="light"] .social-link {
            color: #475569 !important;
            background: rgba(0, 0, 0, 0.03) !important;
            border: 1px solid rgba(0, 0, 0, 0.06) !important;
        }
        [data-theme="light"] .social-link:hover {
            color: #0f172a !important;
            background: rgba(0, 0, 0, 0.06) !important;
            border-color: #0284c7 !important;
        }

        /* Light Mode - Buttons */
        [data-theme="light"] .btn-secondary {
            color: #1e293b !important;
            border-color: #cbd5e1 !important;
        }
        [data-theme="light"] .btn-secondary:hover {
            border-color: #0284c7 !important;
            background: rgba(2, 132, 199, 0.06) !important;
        }

        /* Light Mode - Skill Tags */
        [data-theme="light"] .skill-tag {
            color: #1e293b !important;
            background: rgba(2, 132, 199, 0.06) !important;
            border-color: rgba(2, 132, 199, 0.12) !important;
        }

        /* Light Mode - Timeline */
        [data-theme="light"] .timeline-item {
            border-color: rgba(2, 132, 199, 0.15) !important;
        }
        [data-theme="light"] .timeline-item h3 {
            color: #0f172a !important;
        }
        [data-theme="light"] .timeline-item .text-cyan-300 {
            color: #0284c7 !important;
        }
        [data-theme="light"] .timeline-item .text-gray-400 {
            color: #475569 !important;
        }

        /* Light Mode - Achievements */
        [data-theme="light"] .achievement-badge {
            background: rgba(255, 255, 255, 0.92) !important;
            border: 1px solid rgba(2, 132, 199, 0.10) !important;
        }
        [data-theme="light"] .achievement-badge h4 {
            color: #0f172a !important;
        }
        [data-theme="light"] .achievement-badge p {
            color: #475569 !important;
        }

        /* Light Mode - Links */
        [data-theme="light"] a:not(.btn-primary):not(.btn-secondary):not(.social-link) {
            color: #0284c7 !important;
        }
        [data-theme="light"] a:not(.btn-primary):not(.btn-secondary):not(.social-link):hover {
            color: #0369a1 !important;
        }

        /* Light Mode - Input Fields */
        [data-theme="light"] .input-field {
            background: rgba(0, 0, 0, 0.03) !important;
            border: 1px solid rgba(0, 0, 0, 0.08) !important;
            color: #1e293b !important;
        }
        [data-theme="light"] .input-field:focus {
            border-color: #0284c7 !important;
            background: rgba(255, 255, 255, 0.95) !important;
        }
        [data-theme="light"] .input-field::placeholder {
            color: #94a3b8 !important;
        }

        /* Light Mode - Navbar Active */
        [data-theme="light"] .nav-link-active {
            color: #0f172a !important;
            font-weight: 600 !important;
        }

        /* Light Mode - Certifications */
        [data-theme="light"] .glass h3 {
            color: #0f172a !important;
        }

        /* ===== COMPONENT STYLES ===== */
        .skill-tag {
            background: rgba(0, 212, 255, 0.08);
            border: 1px solid rgba(0, 212, 255, 0.15);
            transition: var(--transition);
            color: var(--text-secondary);
        }

        .skill-tag:hover {
            background: rgba(0, 212, 255, 0.15);
            border-color: rgba(0, 212, 255, 0.30);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.10);
        }

        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            color: var(--text-secondary);
        }

        .project-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 212, 255, 0.30);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            background: rgba(16, 24, 48, 0.90);
        }

        .project-card .icon-wrap {
            background: rgba(0, 212, 255, 0.10);
            transition: var(--transition);
        }

        .project-card:hover .icon-wrap {
            background: rgba(0, 212, 255, 0.20);
            transform: scale(1.05);
        }

        .social-link {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            transition: var(--transition);
            color: var(--text-muted);
        }

        .social-link:hover {
            background: rgba(0, 212, 255, 0.12);
            border-color: rgba(0, 212, 255, 0.30);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.10);
            color: var(--text-primary);
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            transition: var(--transition);
            border: none;
            color: #ffffff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 212, 255, 0.30);
            filter: brightness(1.05);
        }

        [data-theme="light"] .btn-primary {
            background: linear-gradient(135deg, #0284c7, #6d28d9);
        }

        .nav-link {
            position: relative;
            color: var(--text-muted);
            transition: var(--transition);
            cursor: pointer;
        }

        .nav-link:hover {
            color: var(--text-primary);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        [data-theme="light"] .nav-link::after {
            background: linear-gradient(90deg, #0284c7, #6d28d9);
        }

        .nav-link-active {
            color: var(--text-primary) !important;
            font-weight: 600 !important;
        }
        .nav-link-active::after {
            width: 100% !important;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            border-color: rgba(0, 212, 255, 0.40);
            background: rgba(0, 212, 255, 0.06);
            transform: translateY(-2px);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            transition: var(--transition);
            color: var(--text-secondary);
        }

        .input-field:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.10);
            outline: none;
            background: rgba(255, 255, 255, 0.08);
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .theme-toggle {
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 9999px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .theme-toggle:hover {
            border-color: rgba(0, 212, 255, 0.30);
            background: rgba(0, 212, 255, 0.06);
        }

        .timeline-item {
            position: relative;
            padding-left: 28px;
            border-left: 2px solid rgba(0, 212, 255, 0.20);
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 4px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00d4ff;
            border: 2px solid var(--bg-primary);
        }

        [data-theme="light"] .timeline-item::before {
            background: #0284c7;
        }

        .timeline-item:last-child {
            border-left: 2px solid transparent;
        }

        .achievement-badge {
            background: rgba(0, 212, 255, 0.06);
            border: 1px solid rgba(0, 212, 255, 0.10);
            transition: var(--transition);
        }

        .achievement-badge:hover {
            background: rgba(0, 212, 255, 0.10);
            transform: translateY(-2px);
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            z-index: 9999;
            transition: width 0.1s ease;
            width: 0%;
        }

        [data-theme="light"] .progress-bar {
            background: linear-gradient(90deg, #0284c7, #6d28d9);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        @media (max-width: 640px) {
            .projects-grid {
                grid-template-columns: 1fr;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.30);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 212, 255, 0.50);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        .float-animation {
            animation: float 5s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        .pulse-glow {
            animation: pulse-glow 3s ease-in-out infinite;
        }

        .bg-grid-pattern {
            background-image:
                radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.03) 0%, transparent 50%);
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #00d4ff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 12px;
            z-index: 9999;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.5s ease;
            transform: translateY(100px);
            opacity: 0;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }

        .toast-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
    </style>
</head>
<body>

    <div id="progressBar" class="progress-bar"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Toast = ({ message, type, show }) => {
            if (!show) return null;
            return (
                <div className={`toast toast-${type} show`}>
                    {type === 'success' ? <i className="fas fa-check-circle mr-2"></i> : <i className="fas fa-exclamation-circle mr-2"></i>}
                    {message}
                </div>
            );
        };

        const ThemeToggle = ({ theme, toggleTheme }) => {
            return (
                <button onClick={toggleTheme} className="theme-toggle">
                    <i className={`fas ${theme === 'dark' ? 'fa-sun' : 'fa-moon'}`}></i>
                    <span className="hidden sm:inline">{theme === 'dark' ? 'Light' : 'Dark'}</span>
                </button>
            );
        };

        const Navbar = ({ theme, toggleTheme, currentView, setCurrentView, activeSection }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 30);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = [
                { label: 'Home', view: 'home' },
                { label: 'About', view: 'about' },
                { label: 'Education', view: 'education' },
                { label: 'Skills', view: 'skills' },
                { label: 'Projects', view: 'projects' },
                { label: 'Certifications', view: 'certifications' },
                { label: 'Contact', view: 'contact' },
            ];

            const handleNavClick = (view) => {
                if (view === 'projects') {
                    setCurrentView('projects');
                    setTimeout(() => window.scrollTo(0, 0), 50);
                } else {
                    setCurrentView('home');
                    setTimeout(() => {
                        const el = document.getElementById(view);
                        if (el) el.scrollIntoView({ behavior: 'smooth' });
                    }, 100);
                }
                setIsOpen(false);
            };

            const isActive = (view) => {
                if (currentView === 'projects') return view === 'projects';
                return activeSection === view;
            };

            return (
                <nav className={`fixed top-0 left-0 w-full z-50 transition-all duration-300 ${scrolled ? 'glass-nav' : 'bg-transparent'}`}>
                    <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
                        <button onClick={() => handleNavClick('home')} className="text-2xl font-bold tracking-tight">
                            <span className="hero-gradient-text">Amila</span>
                            <span className="text-white/60 font-light">Vajira</span>
                        </button>
                        <div className="hidden md:flex items-center gap-6">
                            {navLinks.map((link) => (
                                <button key={link.label} onClick={() => handleNavClick(link.view)} className={`nav-link text-sm font-medium ${isActive(link.view) ? 'nav-link-active' : ''}`}>
                                    {link.label}
                                </button>
                            ))}
                            <ThemeToggle theme={theme} toggleTheme={toggleTheme} />
                            <button onClick={() => handleNavClick('contact')} className="btn-primary text-white px-5 py-2.5 rounded-full text-sm font-semibold">Let's Talk</button>
                        </div>
                        <div className="flex items-center gap-3 md:hidden">
                            <ThemeToggle theme={theme} toggleTheme={toggleTheme} />
                            <button onClick={() => setIsOpen(!isOpen)} className="text-white/80 hover:text-white text-2xl">
                                {isOpen ? <i className="fas fa-times"></i> : <i className="fas fa-bars"></i>}
                            </button>
                        </div>
                    </div>
                    <div className={`md:hidden overflow-hidden transition-all duration-300 ${isOpen ? 'max-h-[600px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="glass-nav px-6 py-4 flex flex-col gap-4 border-t border-white/5">
                            {navLinks.map((link) => (
                                <button key={link.label} onClick={() => handleNavClick(link.view)} className={`nav-link text-base font-medium py-1.5 text-left ${isActive(link.view) ? 'nav-link-active' : ''}`}>
                                    {link.label}
                                </button>
                            ))}
                            <button onClick={() => handleNavClick('contact')} className="btn-primary text-white px-5 py-2.5 rounded-full text-sm font-semibold text-center mt-1">Let's Talk</button>
                        </div>
                    </div>
                </nav>
            );
        };

        const allProjects = [
            { title: 'Python Calculator', desc: 'A simple calculator with GUI built using Python and Tkinter. Supports addition, subtraction, multiplication, division, and modulus operations with error handling.', tech: ['Python', 'Tkinter', 'GUI'], icon: 'fa-calculator', link: 'https://github.com/Amila999-cell/python-calculator', category: 'Development' },
            { title: 'Student Performance Analytics', desc: 'A dashboard to analyze student performance data and identify patterns using Python and Power BI.', tech: ['Python', 'Power BI', 'Pandas', 'Matplotlib'], icon: 'fa-chart-simple', link: '#', category: 'Analytics' },
            { title: 'Data Visualization Dashboard', desc: 'An interactive dashboard for businesses to visualize sales and customer data using Power BI.', tech: ['Power BI', 'Excel', 'DAX', 'Data Modeling'], icon: 'fa-chart-line', link: '#', category: 'Analytics' },
            { title: 'Inventory Management System', desc: 'A simple inventory management system using Python and SQLite.', tech: ['Python', 'SQLite', 'CRUD'], icon: 'fa-cubes', link: '#', category: 'Development' },
            { title: 'Weather Data Analysis', desc: 'Analyzed weather patterns and trends using Python, Pandas, and Matplotlib.', tech: ['Python', 'Pandas', 'Matplotlib', 'NumPy'], icon: 'fa-cloud-sun', link: '#', category: 'Analytics' },
            { title: 'Sales Data Pipeline', desc: 'Built an ETL pipeline to process and analyze sales data using Python and SQL.', tech: ['Python', 'SQL', 'ETL', 'Data Warehousing'], icon: 'fa-arrow-right-arrow-left', link: '#', category: 'Development' }

                            <div className="text-center max-w-2xl mx-auto mb-14">
                                <span className="text-cyan-400 font-medium text-sm tracking-widest uppercase">Achievements</span>
                                <h2 className="text-3xl sm:text-4xl font-bold text-white mt-2">Beyond <span className="hero-gradient-text">Academics</span></h2>
                                <p className="text-gray-400 text-base mt-4 leading-relaxed">Extracurricular activities and achievements.</p>
                            </div>
                            <div className="grid sm:grid-cols-2 lg:grid-cols-2 max-w-2xl mx-auto gap-6">
                                {[
                                    { title: 'A/L Physical Science', desc: 'Completed A/L in Physical Science stream (2024)', icon: 'fa-graduation-cap' },
                                    { title: 'Volunteer', desc: 'Volunteered for School Tech Events', icon: 'fa-hand-holding-heart' }
                                ].map((item) => (
                                    <div key={item.title} className="achievement-badge rounded-2xl p-6 text-center">
                                        <div className="w-12 h-12 rounded-full bg-cyan-500/10 flex items-center justify-center text-cyan-400 text-xl mx-auto mb-3"><i className={`fas ${item.icon}`}></i></div>
                                        <h4 className="font-semibold text-white text-sm">{item.title}</h4>
                                        <p className="text-xs text-gray-400 mt-1">{item.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* CONTACT */}
                        <section id="contact" className="py-20 md:py-28">
                            <div className="max-w-5xl mx-auto">
                                <div className="text-center max-w-2xl mx-auto mb-14">
                                    <span className="text-cyan-400 font-medium text-sm tracking-widest uppercase">Contact</span>
                                    <h2 className="text-3xl sm:text-4xl font-bold text-white mt-2">Let's <span className="hero-gradient-text">Connect</span></h2>
                                    <p className="text-gray-400 text-base mt-4 leading-relaxed">Have a data project in mind? Let's talk about data engineering and analytics solutions.</p>
                                </div>
                                <div className="glass rounded-2xl p-6 md:p-10 border border-cyan-500/10">
                                    <ContactForm />
                                </div>
                            </div>
                        </section>

                    </div>
                </div>
            );
        };

        const Footer = () => {
            const year = new Date().getFullYear();
            return (
                <footer className="border-t border-cyan-500/10 gradient-bg">
                    <div className="max-w-6xl mx-auto px-6 py-8 flex flex-col sm:flex-row items-center justify-between gap-4">
                        <p className="text-gray-500 text-sm">&copy; {year} <span className="text-white/60 font-medium">Amila Vajira</span>. Aspiring Data Engineer. Built with <i className="fas fa-heart text-rose-400 text-xs mx-1"></i> & React.</p>
                        <div className="flex gap-5 text-sm text-gray-500"><a href="#" className="hover:text-white transition-colors">Privacy</a><a href="#" className="hover:text-white transition-colors">Terms</a><a href="#home" className="hover:text-white transition-colors"><i className="fas fa-arrow-up"></i></a></div>
                    </div>
                </footer>
            );
        };

        const App = () => {
            const [theme, setTheme] = useState('dark');
            const [currentView, setCurrentView] = useState('home');
            const [activeSection, setActiveSection] = useState('home');

            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
                document.body.style.backgroundColor = theme === 'dark' ? '#080c16' : '#f0f4f8';
            }, [theme]);

            const toggleTheme = () => setTheme(theme === 'dark' ? 'light' : 'dark');

            useEffect(() => {
                if (currentView === 'projects') window.scrollTo(0, 0);
            }, [currentView]);

            useEffect(() => {
                const handleScroll = () => {
                    const scrollTop = window.scrollY;
                    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                    document.getElementById('progressBar').style.width = (scrollTop / docHeight) * 100 + '%';
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const handleSectionChange = (section) => {
                if (section !== activeSection && currentView === 'home') setActiveSection(section);
            };

            return (
                <div className="min-h-screen">
                    <Navbar theme={theme} toggleTheme={toggleTheme} currentView={currentView} setCurrentView={setCurrentView} activeSection={activeSection} />
                    {currentView === 'home' ? <HomePage setCurrentView={setCurrentView} onSectionChange={handleSectionChange} /> : <ProjectsPage setCurrentView={setCurrentView} />}
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js">
    </script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js">
    </script>

</body>
</html>
