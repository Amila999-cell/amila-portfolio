<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amila Vajira | Portfolio</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        :root {
            --bg-primary: #0c0e1a;
            --bg-secondary: #141b2d;
            --bg-card: rgba(20, 27, 45, 0.75);
            --text-primary: #ffffff;
            --text-secondary: #e2e8f0;
            --text-muted: #9ca3af;
            --border-color: rgba(6, 182, 212, 0.12);
            --glass-bg: rgba(20, 27, 45, 0.75);
            --glass-border: rgba(6, 182, 212, 0.12);
            --shadow: rgba(6, 182, 212, 0.15);
            --transition: all 0.3s ease;
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.90);
            --text-primary: #0a0f1a;
            --text-secondary: #1e293b;
            --text-muted: #475569;
            --border-color: rgba(6, 182, 212, 0.25);
            --glass-bg: rgba(255, 255, 255, 0.90);
            --glass-border: rgba(6, 182, 212, 0.25);
            --shadow: rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
        }

        .gradient-bg {
            background: radial-gradient(circle at 10% 20%, rgba(6, 182, 212, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(99, 102, 241, 0.06) 0%, transparent 50%),
                var(--bg-primary);
            transition: var(--transition);
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            transition: var(--transition);
        }

        .glass-nav {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            transition: var(--transition);
        }

        .hero-gradient-text {
            background: linear-gradient(135deg, #06b6d4 0%, #22d3ee 40%, #818cf8 70%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .skill-tag {
            background: rgba(6, 182, 212, 0.10);
            border: 1px solid rgba(6, 182, 212, 0.20);
            transition: var(--transition);
            color: var(--text-secondary);
        }

        .skill-tag:hover {
            background: rgba(6, 182, 212, 0.20);
            border-color: rgba(6, 182, 212, 0.40);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--shadow);
        }

        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            color: var(--text-secondary);
        }

        .project-card:hover {
            transform: translateY(-8px);
            border-color: rgba(6, 182, 212, 0.40);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            background: var(--bg-secondary);
        }

        .project-card .icon-wrap {
            background: rgba(6, 182, 212, 0.12);
            transition: var(--transition);
        }

        .project-card:hover .icon-wrap {
            background: rgba(6, 182, 212, 0.25);
            transform: scale(1.05);
        }

        .social-link {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            transition: var(--transition);
            color: var(--text-muted);
        }

        .social-link:hover {
            background: rgba(6, 182, 212, 0.15);
            border-color: rgba(6, 182, 212, 0.30);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px var(--shadow);
            color: var(--text-primary);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            transition: var(--transition);
            color: var(--text-secondary);
        }

        .input-field:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15);
            outline: none;
            background: rgba(255, 255, 255, 0.08);
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .btn-primary {
            background: linear-gradient(135deg, #06b6d4, #22d3ee);
            transition: var(--transition);
            border: none;
            color: #ffffff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(6, 182, 212, 0.35);
            filter: brightness(1.05);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            border-color: rgba(6, 182, 212, 0.40);
            background: rgba(6, 182, 212, 0.08);
            transform: translateY(-2px);
        }

        .nav-link {
            position: relative;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .nav-link:hover {
            color: var(--text-primary);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #06b6d4, #22d3ee);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }

        @keyframes float {
            0%,
            100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        .float-animation {
            animation: float 5s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%,
            100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        .pulse-glow {
            animation: pulse-glow 3s ease-in-out infinite;
        }

        .bg-grid-pattern {
            background-image:
                radial-gradient(circle at 20% 50%, rgba(6, 182, 212, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(99, 102, 241, 0.04) 0%, transparent 50%);
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #06b6d4;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 12px;
            z-index: 9999;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.5s ease;
            transform: translateY(100px);
            opacity: 0;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }

        .toast-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .timeline-item {
            position: relative;
            padding-left: 28px;
            border-left: 2px solid rgba(6, 182, 212, 0.3);
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 4px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #06b6d4;
            border: 2px solid var(--bg-primary);
        }

        .timeline-item:last-child {
            border-left: 2px solid transparent;
        }

        .theme-toggle {
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 9999px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .theme-toggle:hover {
            border-color: rgba(6, 182, 212, 0.4);
            background: rgba(6, 182, 212, 0.08);
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #06b6d4, #22d3ee, #818cf8);
            z-index: 9999;
            transition: width 0.1s ease;
            width: 0%;
        }

        .floating-nav {
            position: fixed;
            right: 24px;
            bottom: 24px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .floating-nav a {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: var(--transition);
            backdrop-filter: blur(8px);
            font-size: 16px;
            text-decoration: none;
        }

        .floating-nav a:hover {
            border-color: rgba(6, 182, 212, 0.4);
            color: var(--text-primary);
            transform: scale(1.1);
            background: rgba(6, 182, 212, 0.08);
        }

        .achievement-badge {
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.15);
            transition: var(--transition);
        }

        .achievement-badge:hover {
            background: rgba(6, 182, 212, 0.15);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .floating-nav {
                right: 12px;
                bottom: 12px;
            }
            .floating-nav a {
                width: 36px;
                height: 36px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <div id="progressBar" class="progress-bar"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ---- TOAST ----
        const Toast = ({ message, type, show }) => {
            if (!show) return null;
            return (
                <div className={`toast toast-${type} show`}>
                    {type === 'success' ? <i className="fas fa-check-circle mr-2"></i> : <i className="fas fa-exclamation-circle mr-2"></i>}
                    {message}
                </div>
            );
        };

        // ---- THEME TOGGLE ----
        const ThemeToggle = ({ theme, toggleTheme }) => {
            return (
                <button onClick={toggleTheme} className="theme-toggle">
                    <i className={`fas ${theme === 'dark' ? 'fa-sun' : 'fa-moon'}`}></i>
                    <span className="hidden sm:inline">{theme === 'dark' ? 'Light' : 'Dark'}</span>
                </button>
            );
        };

        // ---- FLOATING NAV ----
        const FloatingNav = () => {
            const sections = ['home', 'about', 'education', 'skills', 'projects', 'certifications', 'contact'];
            const icons = ['fa-home', 'fa-user', 'fa-graduation-cap', 'fa-code', 'fa-folder-open', 'fa-certificate', 'fa-envelope'];

            return (
                <div className="floating-nav">
                    {sections.map((section, index) => (
                        <a key={section} href={`#${section}`} aria-label={`Go to ${section}`}>
                            <i className={`fas ${icons[index]}`}></i>
                        </a>
                    ))}
                </div>
            );
        };

        // ---- NAVBAR ----
        const Navbar = ({ theme, toggleTheme }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 30);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = [
                { label: 'Home', href: '#home' },
                { label: 'About', href: '#about' },
                { label: 'Education', href: '#education' },
                { label: 'Skills', href: '#skills' },
                { label: 'Projects', href: '#projects' },
                { label: 'Certifications', href: '#certifications' },
                { label: 'Contact', href: '#contact' },
            ];

            return (
                <nav className={`fixed top-0 left-0 w-full z-50 transition-all duration-300 ${scrolled ? 'glass-nav' : 'bg-transparent'}`}>
                    <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
                        <a href="#home" className="text-2xl font-bold tracking-tight">
                            <span className="hero-gradient-text">Amila</span>
                            <span className="text-white/60 font-light">Vajira</span>
                        </a>

                        <div className="hidden md:flex items-center gap-6">
                            {navLinks.map((link) => (
                                <a key={link.label} href={link.href} className="nav-link text-sm font-medium">{link.label}</a>
                            ))}
                            <ThemeToggle theme={theme} toggleTheme={toggleTheme} />
                            <a href="#contact" className="btn-primary text-white px-5 py-2.5 rounded-full text-sm font-semibold">Let's Talk</a>
                        </div>

                        <div className="flex items-center gap-3 md:hidden">
                            <ThemeToggle theme={theme} toggleTheme={toggleTheme} />
                            <button onClick={() => setIsOpen(!isOpen)} className="text-white/80 hover:text-white text-2xl">
                                {isOpen ? <i className="fas fa-times"></i> : <i className="fas fa-bars"></i>}
                            </button>
                        </div>
                    </div>

                    <div className={`md:hidden overflow-hidden transition-all duration-300 ${isOpen ? 'max-h-[600px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="glass-nav px-6 py-4 flex flex-col gap-4 border-t border-white/5">
                            {navLinks.map((link) => (
                                <a key={link.label} href={link.href} onClick={() => setIsOpen(false)} className="nav-link text-base font-medium py-1.5">
                                    {link.label}
                                </a>
                            ))}
                            <a href="#contact" onClick={() => setIsOpen(false)} className="btn-primary text-white px-5 py-2.5 rounded-full text-sm font-semibold text-center mt-1">
                                Let's Talk
                            </a>
                        </div>
                    </div>
                </nav>
            );
        };

        // ---- HERO ----
        const Hero = () => {
            return (
                <section id="home" className="min-h-screen flex items-center justify-center gradient-bg bg-grid-pattern pt-20">
                    <div className="max-w-6xl mx-auto px-6 py-16 md:py-24 w-full">
                        <div className="grid md:grid-cols-2 gap-12 items-center">
                            <div className="order-2 md:order-1">
                                <div className="inline-flex items-center gap-2 bg-cyan-500/10 border border-cyan-500/20 rounded-full px-4 py-1.5 mb-6">
                                    <span className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
                                    <span className="text-sm text-cyan-300 font-medium">IS Undergraduate</span>
                                </div>

                                <h1 className="text-4xl sm:text-5xl md:text-6xl font-extrabold leading-tight tracking-tight">
                                    <span className="text-white">Hi, I'm </span>
                                    <span className="hero-gradient-text">Amila Vajira</span>
                                    <span className="text-white">.</span>
                                    <br />
                                    <span className="hero-gradient-text">Aspiring Data Engineer & Business Analyst</span>
                                </h1>

                                <p className="text-gray-400 text-base sm:text-lg mt-5 max-w-lg leading-relaxed">
                                    Information Systems undergraduate at Sabaragamuwa University.
                                    Passionate about Data Engineering, Business Analysis & Analytics.
                                </p>

                                <div className="flex flex-wrap gap-4 mt-8">
                                    <a href="#projects" className="btn-primary text-white px-7 py-3.5 rounded-full text-sm font-semibold inline-flex items-center gap-2">
                                        View My Work <i className="fas fa-arrow-right text-xs"></i>
                                    </a>
                                    <a href="#contact" className="glass text-white/80 hover:text-white px-7 py-3.5 rounded-full text-sm font-medium inline-flex items-center gap-2 border border-white/10 hover:border-cyan-400/50 transition-all">
                                        <i className="fas fa-paper-plane"></i> Let's Connect
                                    </a>
                                    <a href="#" className="btn-secondary text-white/80 hover:text-white px-7 py-3.5 rounded-full text-sm font-medium inline-flex items-center gap-2">
                                        <i className="fas fa-download"></i> Resume
                                    </a>
                                </div>

                                <div className="flex gap-4 mt-8">
                                    <a href="https://github.com/Amila999-cell" target="_blank" className="social-link w-11 h-11 rounded-full flex items-center justify-center">
                                        <i className="fab fa-github text-lg"></i>
                                    </a>
                                    <a href="https://linkedin.com" target="_blank" className="social-link w-11 h-11 rounded-full flex items-center justify-center">
                                        <i className="fab fa-linkedin-in text-lg"></i>
                                    </a>
                                    <a href="#" className="social-link w-11 h-11 rounded-full flex items-center justify-center">
                                        <i className="fab fa-twitter text-lg"></i>
                                    </a>
                                </div>
                            </div>

                            <div className="order-1 md:order-2 flex justify-center">
                                <div className="relative">
                                    <div className="absolute inset-0 rounded-full bg-cyan-500/20 blur-3xl -z-10 scale-150 pulse-glow"></div>
                                    <div className="relative w-64 h-64 sm:w-80 sm:h-80 md:w-96 md:h-96 rounded-full overflow-hidden border-2 border-cyan-500/30 shadow-2xl shadow-cyan-500/10 float-animation">
                                        <div className="w-full h-full bg-gradient-to-br from-cyan-900/30 via-blue-900/20 to-indigo-900/30 flex items-center justify-center">
                                            <div className="text-8xl sm:text-9xl text-white/20 font-light">👨‍🎓</div>
                                        </div>
                                        <div className="absolute inset-0 rounded-full border border-white/5"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="flex justify-center mt-16 md:mt-20">
                            <a href="#about" className="text-gray-500 hover:text-gray-300 transition-colors flex flex-col items-center gap-2 text-sm">
                                <span>Scroll</span>
                                <i className="fas fa-chevron-down animate-bounce text-xs"></i>
                            </a>
                        </div>
                    </div>
                </section>
            );
        };

        // ---- ABOUT ----
        const About = () => {
            return (
                <section id="about" className="py-20 md:py-28 gradient-bg bg-grid-pattern">
                    <div className="max-w-6xl mx-auto px-6">
                        <div className="flex flex-col md:flex-row gap-12 md:gap-20 items-center">
                            <div className="md:w-5/12">
                                <div className="relative">
                                    <div className="absolute -top-6 -left-6 w-24 h-24 border border-cyan-500/20 rounded-xl"></div>
                                    <div className="absolute -bottom-6 -right-6 w-32 h-32 border border-blue-500/20 rounded-xl"></div>
                                    <div className="relative glass rounded-2xl p-6 border border-cyan-500/10 overflow-hidden">
                                        <div className="aspect-[4/3] rounded-xl bg-gradient-to-br from-cyan-900/20 via-blue-900/10 to-indigo-900/20 flex items-center justify-center">
                                            <div className="text-7xl opacity-30">📊</div>
                                        </div>
                                        <div className="absolute bottom-4 right-4 glass px-3 py-1.5 rounded-full border border-cyan-500/20 text-xs text-white/60">
                                            <i className="fas fa-rocket mr-1.5 text-cyan-400"></i> Data Enthusiast
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="md:w-7/12">
                                <span className="text-cyan-400 font-medium text-sm tracking-widest uppercase">About Me</span>
                                <h2 className="text-3xl sm:text-4xl font-bold text-white mt-2">
                                    Information Systems <br className="hidden sm:block" />
                                    <span className="hero-gradient-text">Undergraduate</span>
                                </h2>
                                <p className="text-gray-400 text-base leading-relaxed mt-5">
                                    I'm an Information Systems undergraduate at Sabaragamuwa University of Sri Lanka.
                                    I completed my A/Ls in the Physical Science stream, which gave me a strong 
                                    foundation in analytical thinking and problem-solving.
                                </p>
                                <p className="text-gray-400 text-base leading-relaxed mt-3">
                                    I'm passionate about Data Engineering, Business Analysis, and Analytics. 
                                    I'm continuously learning and building my skills in data processing, analytics, 
                                    and business intelligence. My goal is to become a skilled professional who bridges 
                                    the gap between raw data and actionable business insights.
                                </p>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // ---- EDUCATION ----
        const Education = () => {
            const educationData = [
                {
                    year: '2026 - Present',
                    title: 'BSc (Hons) in Information Systems',
                    institution: 'Sabaragamuwa University of Sri Lanka',
                    description: 'Focus on Information Systems, Data Engineering, and Business Analysis.',
                    icon: 'fa-graduation-cap'
                },
            ];

            return (
                <section id="education" className="py-20 md:py-28 gradient-bg bg-grid-pattern">
                    <div className="max-w-6xl mx-auto px-6">
                        <div className="text-center max-w-2xl mx-auto mb-14">
                            <span className="text-cyan-400 font-medium text-sm tracking-widest uppercase">Education</span>
                            <h2 className="text-3xl sm:text-4xl font-bold text-white mt-2">
                                My <span className="hero-gradient-text">Journey</span>
                            </h2>
                            <p className="text-gray-400 text-base mt-4 leading-relaxed">Academic background and qualifications.</p>
                        </div>

                        <div className="max-w-3xl mx-auto space-y-6">
                            {educationData.map((item, index) => (
                                <div key={index} className="timeline-item glass rounded-2xl p-6 border border-cyan-500/10">
                                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2 mb-2">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-full bg-cyan-500/10 flex items-center justify-center text-cyan-400">
                                                <i className={`fas ${item.icon}`}></i>
                                            </div>
                                            <h3 className="text-lg font-bold text-white">{item.title}</h3>
                                        </div>
                                        <span className="text-sm text-cyan-400 font-medium">{item.year}</span>
                                    </div>
                                    <p className="text-cyan-300 text-sm font-medium ml-12 sm:ml-0">{item.institution}</p>
                                    <p className="text-gray-400 text-sm ml-12 sm:ml-0 mt-1">{item.description}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // ---- SKILLS ----
        const Skills = () => {
            const skillCategories = [
                {
                    title: 'Data Engineering (Learning)',
