<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amila Vajira | Data Engineer</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

        * {
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        :root {
            --bg-primary: #0c0e1a;
            --bg-secondary: #141b2d;
            --bg-card: rgba(20, 27, 45, 0.75);
            --text-primary: #ffffff;
            --text-secondary: #e2e8f0;
            --text-muted: #9ca3af;
            --text-light: #ffffff;
            --border-color: rgba(6, 182, 212, 0.12);
            --glass-bg: rgba(20, 27, 45, 0.75);
            --glass-border: rgba(6, 182, 212, 0.12);
            --shadow: rgba(6, 182, 212, 0.15);
            --transition: all 0.3s ease;
        }

        [data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.95);
            --text-primary: #0f172a;
            --text-secondary: #1e293b;
            --text-muted: #475569;
            --text-light: #0f172a;
            --border-color: rgba(6, 182, 212, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(6, 182, 212, 0.15);
            --shadow: rgba(0, 0, 0, 0.06);
        }

        /* ===== FIXED LIGHT THEME - LINKEDIN BROWSER ===== */
        [data-theme="light"] body,
        [data-theme="light"] .gradient-bg,
        [data-theme="light"] .bg-grid-pattern {
            background: #ffffff !important;
        }

        [data-theme="light"] .text-white,
        [data-theme="light"] .text-white\/\[0\.6\],
        [data-theme="light"] .text-white\/\[0\.8\],
        [data-theme="light"] .text-white\/60,
        [data-theme="light"] .text-white\/80,
        [data-theme="light"] .hero-text-white,
        [data-theme="light"] .text-white\/20,
        [data-theme="light"] .text-white\/\[0\.2\] {
            color: #0f172a !important;
        }

        [data-theme="light"] h1,
        [data-theme="light"] h2,
        [data-theme="light"] h3,
        [data-theme="light"] h4,
        [data-theme="light"] h5,

        }

        [data-theme="light"] .text-gray-300 {

        }
        [data-theme="light"] .text-gray-400 {

        }
        [data-theme="light"] .text-gray-500 {
            color: #64748b !important;
        }
        [data-theme="light"] .text-cyan-300,
        [data-theme="light"] .text-cyan-400 {

        }

        [data-theme="light"] .glass,
        [data-theme="light"] .glass-nav {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(6, 182, 212, 0.12) !important;
        }

        [data-theme="light"] .project-card {
            background: rgba(255, 255, 255, 0.95) !important;
            border: 1px solid rgba(6, 182, 212, 0.12) !important;
        }
        [data-theme="light"] .project-card h3 {
            color: #0f172a !important;
        }
        [data-theme="light"] .project-card p {

        }
        [data-theme="light"] .project-card .text-gray-400 {
            color: #475569 !important;
        }
        [data-theme="light"] .project-card .text-gray-500 {
            color: #64748b !important;
        }
        [data-theme="light"] .project-card .border-t {
            border-color: rgba(6, 182, 212, 0.12) !important;
        }
        [data-theme="light"] .project-card .text-cyan-400 {
            color: #0e7490 !important;
        }

        [data-theme="light"] .nav-link-active {
            color: #0f172a !important;
            font-weight: 600 !important;
        }

        [data-theme="light"] .social-link {
            color: #475569 !important;
            background: rgba(0, 0, 0, 0.03) !important;
            border: 1px solid rgba(0, 0, 0, 0.06) !important;
        }
        [data-theme="light"] .social-link:hover {
            color: #0f172a !important;
            background: rgba(0, 0, 0, 0.06) !important;
        }

        [data-theme="light"] .btn-secondary {
            color: #1e293b !important;
            border-color: #cbd5e1 !important;
            background: transparent !important;
        }
        [data-theme="light"] .btn-secondary:hover {
            border-color: #0e7490 !important;
            background: rgba(14, 116, 144, 0.06) !important;
        }

        [data-theme="light"] .skill-tag {
            color: #1e293b !important;
            background: rgba(6, 182, 212, 0.06) !important;
            border-color: rgba(6, 182, 212, 0.12) !important;
        }

        [data-theme="light"] .timeline-item {
            border-color: rgba(6, 182, 212, 0.15) !important;
        }
        [data-theme="light"] .timeline-item h3 {
            color: #0f172a !important;
        }
        [data-theme="light"] .timeline-item .text-cyan-300 {
            color: #0e7490 !important;
        }
        [data-theme="light"] .timeline-item .text-gray-400 {
            color: #475569 !important;
        }

        [data-theme="light"] .achievement-badge {
            background: rgba(255, 255, 255, 0.95) !important;
            border: 1px solid rgba(6, 182, 212, 0.12) !important;
        }
        [data-theme="light"] .achievement-badge h4 {
            color: #0f172a !important;
        }
        [data-theme="light"] .achievement-badge p {
            color: #475569 !important;
        }

        [data-theme="light"] .glass h3 {
            color: #0f172a !important;
        }

        [data-theme="light"] a:not(.btn-primary):not(.btn-secondary):not(.social-link) {
            color: #0e7490 !important;
        }
        [data-theme="light"] a:not(.btn-primary):not(.btn-secondary):not(.social-link):hover {
            color: #0a5c73 !important;
        }

        [data-theme="light"] .bg-cyan-500\/10 {
            background: rgba(6, 182, 212, 0.08) !important;
        }
        [data-theme="light"] .border-cyan-500\/20 {
            border-color: rgba(6, 182, 212, 0.15) !important;
        }

        [data-theme="light"] .input-field {
            background: rgba(0, 0, 0, 0.03) !important;
            border: 1px solid rgba(0, 0, 0, 0.08) !important;
            color: #1e293b !important;
        }
        [data-theme="light"] .input-field:focus {
            border-color: #0e7490 !important;
            background: rgba(255, 255, 255, 0.95) !important;
        }
        [data-theme="light"] .input-field::placeholder {
            color: #94a3b8 !important;
        }

        [data-theme="light"] .hero-gradient-text {
            background: linear-gradient(135deg, #06b6d4 0%, #22d3ee 40%, #818cf8 70%, #a78bfa 100%) !important;
            -webkit-background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            background-clip: text !important;
        }

        [data-theme="light"] .learning-badge.current {
            color: #0e7490 !important;
            background: rgba(6, 182, 212, 0.10) !important;
            border-color: rgba(6, 182, 212, 0.20) !important;
        }
        [data-theme="light"] .learning-badge.plan {
            color: #b45309 !important;
            background: rgba(251, 191, 36, 0.10) !important;
            border-color: rgba(251, 191, 36, 0.20) !important;
        }

        [data-theme="light"] .theme-toggle {
            color: #1e293b !important;
            background: rgba(0, 0, 0, 0.03) !important;
            border-color: rgba(0, 0, 0, 0.08) !important;
        }
        [data-theme="light"] .theme-toggle:hover {
            border-color: #0e7490 !important;
            background: rgba(14, 116, 144, 0.06) !important;
        }

        [data-theme="light"] ::-webkit-scrollbar {
            width: 8px;
        }
        [data-theme="light"] ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        [data-theme="light"] ::-webkit-scrollbar-thumb {
            background: #c1c7cd;
            border-radius: 10px;
        }
        [data-theme="light"] ::-webkit-scrollbar-thumb:hover {
            background: #a0a7ae;
        }

        [data-theme="light"] .toast-success {
            background: rgba(16, 185, 129, 0.10) !important;
            color: #065f46 !important;
            border: 1px solid rgba(16, 185, 129, 0.20) !important;
        }
        [data-theme="light"] .toast-error {
            background: rgba(239, 68, 68, 0.10) !important;
            color: #991b1b !important;
            border: 1px solid rgba(239, 68, 68, 0.20) !important;
        }

        body {
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
            font-weight: 400;
        }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 600;
        }

        .gradient-bg {
            background: radial-gradient(circle at 10% 20%, rgba(6, 182, 212, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(99, 102, 241, 0.06) 0%, transparent 50%),
                var(--bg-primary);
            transition: var(--transition);
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            transition: var(--transition);
        }

        .glass-nav {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            transition: var(--transition);
        }

        .hero-gradient-text {
            background: linear-gradient(135deg, #06b6d4 0%, #22d3ee 40%, #818cf8 70%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .skill-tag {
            background: rgba(6, 182, 212, 0.10);
            border: 1px solid rgba(6, 182, 212, 0.20);
            transition: var(--transition);
            color: var(--text-secondary);
        }

        .skill-tag:hover {
            background: rgba(6, 182, 212, 0.20);
            border-color: rgba(6, 182, 212, 0.40);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--shadow);
        }

        .learning-badge {
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 9999px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .learning-badge.current {
            background: rgba(6, 182, 212, 0.15);
            color: #22d3ee;
            border: 1px solid rgba(6, 182, 212, 0.25);
        }

        .learning-badge.plan {
            background: rgba(251, 191, 36, 0.12);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            color: var(--text-secondary);
        }

        .project-card:hover {
            transform: translateY(-8px);
            border-color: rgba(6, 182, 212, 0.40);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            background: var(--bg-secondary);
        }

        .project-card .icon-wrap {
            background: rgba(6, 182, 212, 0.12);
            transition: var(--transition);
        }

        .project-card:hover .icon-wrap {
            background: rgba(6, 182, 212, 0.25);
            transform: scale(1.05);
        }

        .social-link {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            transition: var(--transition);
            color: var(--text-muted);
        }

        .social-link:hover {
            background: rgba(6, 182, 212, 0.15);
            border-color: rgba(6, 182, 212, 0.30);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px var(--shadow);
            color: var(--text-primary);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            transition: var(--transition);
            color: var(--text-secondary);
        }

        .input-field:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15);
            outline: none;
            background: rgba(255, 255, 255, 0.08);
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .btn-primary {
            background: linear-gradient(135deg, #06b6d4, #22d3ee);
            transition: var(--transition);
            border: none;
            color: #ffffff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(6, 182, 212, 0.35);
            filter: brightness(1.05);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            border-color: rgba(6, 182, 212, 0.40);
            background: rgba(6, 182, 212, 0.08);
            transform: translateY(-2px);
        }

        .nav-link {
            position: relative;
            color: var(--text-muted);
            transition: var(--transition);
            cursor: pointer;
        }

        .nav-link:hover {
            color: var(--text-primary);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #06b6d4, #22d3ee);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .nav-link-active {
            color: var(--text-primary) !important;
            font-weight: 600 !important;
        }
        .nav-link-active::after {
            width: 100% !important;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        .float-animation {
            animation: float 5s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        .pulse-glow {
            animation: pulse-glow 3s ease-in-out infinite;
        }

        .bg-grid-pattern {
            background-image:
                radial-gradient(circle at 20% 50%, rgba(6, 182, 212, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(99, 102, 241, 0.04) 0%, transparent 50%);
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #06b6d4;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 12px;
            z-index: 9999;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.5s ease;
            transform: translateY(100px);
            opacity: 0;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }

        .toast-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .timeline-item {
            position: relative;
            padding-left: 28px;
            border-left: 2px solid rgba(6, 182, 212, 0.3);
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 4px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #06b6d4;
            border: 2px solid var(--bg-primary);
        }

        .timeline-item:last-child {
            border-left: 2px solid transparent;
        }

        .theme-toggle {
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 9999px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .theme-toggle:hover {
            border-color: rgba(6, 182, 212, 0.4);
            background: rgba(6, 182, 212, 0.08);
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #06b6d4, #22d3ee, #818cf8);
            z-index: 9999;
            transition: width 0.1s ease;
            width: 0%;
        }

        .achievement-badge {
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.15);
            transition: var(--transition);
        }

        .achievement-badge:hover {
            background: rgba(6, 182, 212, 0.15);
            transform: translateY(-2px);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        @media (max-width: 640px) {
            .projects-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div id="progressBar" class="progress-bar"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Detect LinkedIn in-app browser
        const isLinkedInBrowser = navigator.userAgent.includes('LinkedIn') || 
                                  navigator.userAgent.includes('linkedin') ||
                                  navigator.userAgent.includes('LinkedInApp');

        const Toast = ({ message, type, show }) => {
            if (!show) return null;
            return (
                <div className={`toast toast-${type} show`}>
                    {type === 'success' ? <i className="fas fa-check-circle mr-2"></i> : <i className="fas fa-exclamation-circle mr-2"></i>}
                    {message}
                </div>
            );
        };

        const ThemeToggle = ({ theme, toggleTheme }) => {
            return (
                <button onClick={toggleTheme} className="theme-toggle">
                    <i className={`fas ${theme === 'dark' ? 'fa-sun' : 'fa-moon'}`}></i>
                    <span className="hidden sm:inline">{theme === 'dark' ? 'Light' : 'Dark'}</span>
                </button>
            );
        };

        const Navbar = ({ theme, toggleTheme, currentView, setCurrentView, activeSection }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 30);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = [
                { label: 'Home', view: 'home' },
                { label: 'About', view: 'about' },
                { label: 'Education', view: 'education' },
                { label: 'Skills', view: 'skills' },
                { label: 'Projects', view: 'projects' },
                { label: 'Certifications', view: 'certifications' },
                { label: 'Contact', view: 'contact' },
            ];

            const handleNavClick = (view) => {
                if (view === 'projects') {
                    setCurrentView('projects');
                    setTimeout(() => window.scrollTo(0, 0), 50);
                } else {
                    setCurrentView('home');
                    setTimeout(() => {
                        const el = document.getElementById(view);
                        if (el) el.scrollIntoView({ behavior: 'smooth' });
                    }, 100);
                }
                setIsOpen(false);
            };

            const isActive = (view) => {
                if (currentView === 'projects') return view === 'projects';
                return activeSection === view;
            };

            return (
                <nav className={`fixed top-0 left-0 w-full z-50 transition-all duration-300 ${scrolled ? 'glass-nav' : 'bg-transparent'}`}>
                    <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
                        <button onClick={() => handleNavClick('home')} className="text-2xl font-bold tracking-tight">
                            <span className="hero-gradient-text">Amila</span>
                            <span className="text-white/60 font-light">Vajira</span>
                        </button>
                        <div className="hidden md:flex items-center gap-6">
                            {navLinks.map((link) => (
                                <button key={link.label} onClick={() => handleNavClick(link.view)} className={`nav-link text-sm font-medium ${isActive(link.view) ? 'nav-link-active' : ''}`}>
                                    {link.label}
                                </button>
                            ))}
                            <ThemeToggle theme={theme} toggleTheme={toggleTheme} />
                            <button onClick={() => handleNavClick('contact')} className="btn-primary text-white px-5 py-2.5 rounded-full text-sm font-semibold">Let's Talk</button>
                        </div>
                        <div className="flex items-center gap-3 md:hidden">
                            <ThemeToggle theme={theme} toggleTheme={toggleTheme} />
                            <button onClick={() => setIsOpen(!isOpen)} className="text-white/80 hover:text-white text-2xl">
                                {isOpen ? <i className="fas fa-times"></i> : <i className="fas fa-bars"></i>}
                            </button>
                        </div>
                    </div>
                    <div className={`md:hidden overflow-hidden transition-all duration-300 ${isOpen ? 'max-h-[600px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="glass-nav px-6 py-4 flex flex-col gap-4 border-t border-white/5">
                            {navLinks.map((link) => (
                                <button key={link.label} onClick={() => handleNavClick(link.view)} className={`nav-link text-base font-medium py-1.5 text-left ${isActive(link.view) ? 'nav-link-active' : ''}`}>
                                    {link.label}
                                </button>
                            ))}
                            <button onClick={() => handleNavClick('contact')} className="btn-primary text-white px-5 py-2.5 rounded-full text-sm font-semibold text-center mt-1">Let's Talk</button>
                        </div>
                    </div>
                </nav>
            );
        };

        const allProjects = [
            {
                title: 'Sales Data Pipeline',
                desc: 'Built an ETL pipeline to process and analyze sales data using Python and SQL. Extracted data from CSV files, transformed with Pandas, and loaded into PostgreSQL.',
                tech: ['Python', 'SQL', 'ETL', 'Pandas', 'PostgreSQL'],
                icon: 'fa-arrow-right-arrow-left',
                link: '#',
                category: 'Data Engineering'
            },

                                        <div className="mt-5 pt-4 border-t border-cyan-500/10 flex justify-between items-center">
                                            <span className="text-xs text-gray-500">
                                                {p.link && p.link !== '#' ? (
                                                    <a href={p.link} target="_blank" className="text-cyan-400 hover:text-cyan-300 transition-colors">
                                                        <i className="fab fa-github mr-1"></i> View on GitHub
                                                    </a>
                                                ) : 'Coming Soon'}
                                            </span>
                                            {p.link && p.link !== '#' && (
                                                <a href={p.link} target="_blank" className="text-cyan-400 hover:text-cyan-300 transition-colors text-sm">
                                                    <i className="fas fa-arrow-right"></i>
                                                </a>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="text-center mt-10">
                                <button onClick={handleSeeMore} className="inline-flex items-center gap-2 text-cyan-400 hover:text-white border border-cyan-500/30 hover:border-cyan-400/60 px-6 py-3 rounded-full transition-all text-sm font-medium bg-transparent hover:bg-cyan-500/10">
                                    See More <i className="fas fa-arrow-right text-xs"></i>
                                </button>
                            </div>
                        </section>

                        {/* ✅ CERTIFICATIONS - 3 (AWS, IBM, Databricks) */}
                        <section id="certifications" className="py-20 md:py-28">
                            <div className="text-center max-w-2xl mx-auto mb-14">
                                <span className="text-cyan-400 font-medium text-sm tracking-widest uppercase">Certifications</span>
                                <h2 className="text-3xl sm:text-4xl font-bold text-white mt-2">Planned <span className="hero-gradient-text">Certifications</span></h2>
                                <p className="text-gray-400 text-base mt-4 leading-relaxed">Certifications I plan to pursue in Data Engineering.</p>
                            </div>
                            <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                {[
                                    { 
                                        title: 'AWS Certified Data Engineer – Associate', 
                                        status: 'Planned', 
                                        icon: 'fa-aws', 
                                        field: 'Data Engineering',
                                        description: 'Designing secure data pipelines on AWS'
                                    },
                                    { 
                                        title: 'IBM Data Engineering Professional Certificate', 
                                        status: 'Planned', 
                                        icon: 'fa-ibm', 
                                        field: 'Data Engineering',
                                        description: 'ETL processes, relational databases, NoSQL'
                                    },
                                    { 
                                        title: 'Databricks Certified Data Engineer Associate', 
                                        status: 'Planned', 
                                        icon: 'fa-databricks', 
                                        field: 'Data Engineering',
                                        description: 'Big data processing with Apache Spark'
                                    }
                                ].map((cert) => (
                                    <div key={cert.title} className="glass rounded-2xl p-6 border border-cyan-500/10 text-center hover:border-cyan-500/30 transition-all">
                                        <div className="w-12 h-12 rounded-full bg-cyan-500/10 flex items-center justify-center text-cyan-400 text-xl mx-auto mb-4">
                                            <i className={`fab ${cert.icon}`}></i>
                                        </div>
                                        <h3 className="text-sm font-semibold text-white">{cert.title}</h3>
                                        <p className="text-xs text-cyan-300 mt-1">{cert.description}</p>
                                        <span className="text-xs mt-2 inline-block px-3 py-1 rounded-full bg-cyan-500/10 text-cyan-400 border border-cyan-500/20">
                                            {cert.field}
                                        </span>
                                        <div className="mt-3">
                                            <span className="text-xs inline-block px-3 py-1 rounded-full bg-yellow-500/10 text-yellow-400 border border-yellow-500/20">
                                                {cert.status}
                                            </span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* ACHIEVEMENTS */}
                        <section id="achievements" className="py-20 md:py-28">
                            <div className="text-center max-w-2xl mx-auto mb-14">
                                <span className="text-cyan-400 font-medium text-sm tracking-widest uppercase">Achievements</span>
                                <h2 className="text-3xl sm:text-4xl font-bold text-white mt-2">Beyond <span className="hero-gradient-text">Academics</span></h2>
                                <p className="text-gray-400 text-base mt-4 leading-relaxed">Extracurricular activities and achievements.</p>
                            </div>
                            <div className="grid sm:grid-cols-2 lg:grid-cols-2 max-w-2xl mx-auto gap-6">
                                {[
                                    { title: 'A/L Physical Science', desc: 'Completed A/L in Physical Science stream (2024)', icon: 'fa-graduation-cap' },
                                    { title: 'Volunteer', desc: 'Volunteered for School Tech Events', icon: 'fa-hand-holding-heart' }
                                ].map((item) => (
                                    <div key={item.title} className="achievement-badge rounded-2xl p-6 text-center">
                                        <div className="w-12 h-12 rounded-full bg-cyan-500/10 flex items-center justify-center text-cyan-400 text-xl mx-auto mb-3"><i className={`fas ${item.icon}`}></i></div>
                                        <h4 className="font-semibold text-white text-sm">{item.title}</h4>
                                        <p className="text-xs text-gray-400 mt-1">{item.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* CONTACT */}
                        <section id="contact" className="py-20 md:py-28">
                            <div className="max-w-5xl mx-auto">
                                <div className="text-center max-w-2xl mx-auto mb-14">
                                    <span className="text-cyan-400 font-medium text-sm tracking-widest uppercase">Contact</span>
                                    <h2 className="text-3xl sm:text-4xl font-bold text-white mt-2">Let's <span className="hero-gradient-text">Connect</span></h2>
                                    <p className="text-gray-400 text-base mt-4 leading-relaxed">Have a data project in mind? Let's talk about data engineering solutions.</p>
                                </div>
                                <div className="glass rounded-2xl p-6 md:p-10 border border-cyan-500/10">
                                    <ContactForm />
                                </div>
                            </div>
                        </section>

                    </div>
                </div>
            );
        };

        const Footer = () => {
            const year = new Date().getFullYear();
            return (
                <footer className="border-t border-cyan-500/10 gradient-bg">
                    <div className="max-w-6xl mx-auto px-6 py-8 flex flex-col sm:flex-row items-center justify-between gap-4">
                        <p className="text-gray-500 text-sm">&copy; {year} <span className="text-white/60 font-medium">Amila Vajira</span>. Aspiring Data Engineer. Built with <i className="fas fa-heart text-rose-400 text-xs mx-1"></i> & React.</p>
                        <div className="flex gap-5 text-sm text-gray-500"><a href="#" className="hover:text-white transition-colors">Privacy</a><a href="#" className="hover:text-white transition-colors">Terms</a><a href="#home" className="hover:text-white transition-colors"><i className="fas fa-arrow-up"></i></a></div>
                    </div>
                </footer>
            );
        };

        const App = () => {
            // LinkedIn browser එක detect කරලා auto light mode set කරන්න
            const isLinkedIn = navigator.userAgent.includes('LinkedIn') || 
                               navigator.userAgent.includes('linkedin') ||
                               navigator.userAgent.includes('LinkedInApp');

            const [theme, setTheme] = useState(() => {
                if (isLinkedIn) {
                    return 'light';
                }
                return 'dark';
            });
            const [currentView, setCurrentView] = useState('home');
            const [activeSection, setActiveSection] = useState('home');

            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
                document.body.style.backgroundColor = theme === 'dark' ? '#0c0e1a' : '#ffffff';
            }, [theme]);

            const toggleTheme = () => setTheme(theme === 'dark' ? 'light' : 'dark');

            useEffect(() => {
                if (currentView === 'projects') window.scrollTo(0, 0);
            }, [currentView]);

            useEffect(() => {
                const handleScroll = () => {
                    const scrollTop = window.scrollY;
                    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                    document.getElementById('progressBar').style.width = (scrollTop / docHeight) * 100 + '%';
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const handleSectionChange = (section) => {
                if (section !== activeSection && currentView === 'home') setActiveSection(section);
            };

            return (
                <div className="min-h-screen">
                    <Navbar theme={theme} toggleTheme={toggleTheme} currentView={currentView} setCurrentView={setCurrentView} activeSection={activeSection} />
                    {currentView === 'home' ? <HomePage setCurrentView={setCurrentView} onSectionChange={handleSectionChange} /> : <ProjectsPage setCurrentView={setCurrentView} />}
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js">
    </script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js">
    </script>

</body>
</html>
