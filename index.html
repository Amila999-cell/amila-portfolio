<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amila Vajira | Portfolio</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        .gradient-bg {
            background: radial-gradient(circle at 10% 20%, rgba(6, 182, 212, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(99, 102, 241, 0.10) 0%, transparent 50%),
                #0c0e1a;
        }

        .glass {
            background: rgba(20, 27, 45, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(6, 182, 212, 0.12);
        }

        .glass-nav {
            background: rgba(12, 14, 26, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(6, 182, 212, 0.10);
        }

        .hero-gradient-text {
            background: linear-gradient(135deg, #06b6d4 0%, #22d3ee 40%, #818cf8 70%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .skill-tag {
            background: rgba(6, 182, 212, 0.10);
            border: 1px solid rgba(6, 182, 212, 0.20);
            transition: all 0.3s ease;
        }

        .skill-tag:hover {
            background: rgba(6, 182, 212, 0.20);
            border-color: rgba(6, 182, 212, 0.40);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(6, 182, 212, 0.15);
        }

        .project-card {
            background: rgba(20, 27, 45, 0.60);
            border: 1px solid rgba(6, 182, 212, 0.08);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .project-card:hover {
            transform: translateY(-8px);
            border-color: rgba(6, 182, 212, 0.40);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            background: rgba(20, 27, 45, 0.90);
        }

        .project-card .icon-wrap {
            background: rgba(6, 182, 212, 0.12);
            transition: all 0.3s ease;
        }

        .project-card:hover .icon-wrap {
            background: rgba(6, 182, 212, 0.25);
            transform: scale(1.05);
        }

        .social-link {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(6, 182, 212, 0.10);
            transition: all 0.3s ease;
        }

        .social-link:hover {
            background: rgba(6, 182, 212, 0.15);
            border-color: rgba(6, 182, 212, 0.30);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(6, 182, 212, 0.15);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(6, 182, 212, 0.12);
            transition: all 0.3s ease;
            color: #e2e8f0;
        }

        .input-field:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15);
            outline: none;
            background: rgba(255, 255, 255, 0.06);
        }

        .input-field::placeholder {
            color: #6b7280;
        }

        .btn-primary {
            background: linear-gradient(135deg, #06b6d4, #22d3ee);
            transition: all 0.3s ease;
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(6, 182, 212, 0.35);
            filter: brightness(1.05);
        }

        .nav-link {
            position: relative;
            color: #9ca3af;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #e2e8f0;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #06b6d4, #22d3ee);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0c0e1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-12px);
            }
        }
        .float-animation {
            animation: float 5s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 0.8;
            }
        }
        .pulse-glow {
            animation: pulse-glow 3s ease-in-out infinite;
        }

        .bg-grid-pattern {
            background-image:
                radial-gradient(circle at 20% 50%, rgba(6, 182, 212, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(99, 102, 241, 0.04) 0%, transparent 50%);
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #06b6d4;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 12px;
            z-index: 9999;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.5s ease;
            transform: translateY(100px);
            opacity: 0;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }

        .toast-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ---- TOAST NOTIFICATION COMPONENT ----
        const Toast = ({ message, type, show }) => {
            if (!show) return null;
            return (
                <div className={`toast toast-${type} show`}>
                    {type === 'success' ? (
                        <i className="fas fa-check-circle mr-2"></i>
                    ) : (
                        <i className="fas fa-exclamation-circle mr-2"></i>
                    )}
                    {message}
                </div>
            );
        };

        // ---- NAVBAR ----
        const Navbar = () => {
            const [isOpen, setIsOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setScrolled(window.scrollY > 30);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = [
                { label: 'Home', href: '#home' },
                { label: 'About', href: '#about' },
                { label: 'Skills', href: '#skills' },
                { label: 'Projects', href: '#projects' },
                { label: 'Contact', href: '#contact' },
            ];

            return (
                <nav className={`fixed top-0 left-0 w-full z-50 transition-all duration-300 ${scrolled ? 'glass-nav' : 'bg-transparent'
                    }`}>
                    <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
                        <a href="#home" className="text-2xl font-bold tracking-tight">
                            <span className="hero-gradient-text">Amila</span>
                            <span className="text-white/60 font-light">Vajira</span>
                        </a>

                        <div className="hidden md:flex items-center gap-8">
                            {navLinks.map((link) => (
                                <a
                                    key={link.label}
                                    href={link.href}
                                    className="nav-link text-sm font-medium"
                                >
                                    {link.label}
                                </a>
                            ))}
                            <a
                                href="#contact"
                                className="btn-primary text-white px-5 py-2.5 rounded-full text-sm font-semibold"
                            >
                                Let's Talk
                            </a>
                        </div>

                        <button
                            onClick={() => setIsOpen(!isOpen)}
                            className="md:hidden text-white/80 hover:text-white text-2xl focus:outline-none"
                            aria-label="Toggle menu"
                        >
                            {isOpen ? <i className="fas fa-times"></i> : <i className="fas fa-bars"></i>}
                        </button>
                    </div>

                    <div className={`md:hidden overflow-hidden transition-all duration-300 ease-in-out ${isOpen ? 'max-h-[400px] opacity-100' : 'max-h-0 opacity-0'
                        }`}>
                        <div className="glass-nav px-6 py-4 flex flex-col gap-4 border-t border-white/5">
                            {navLinks.map((link) => (
                                <a
                                    key={link.label}
                                    href={link.href}
                                    onClick={() => setIsOpen(false)}
                                    className="nav-link text-base font-medium py-1.5"
                                >
                                    {link.label}
                                </a>
                            ))}
                            <a
                                href="#contact"
                                onClick={() => setIsOpen(false)}
                                className="btn-primary text-white px-5 py-2.5 rounded-full text-sm font-semibold text-center mt-1"
                            >
                                Let's Talk
                            </a>
                        </div>
                    </div>
                </nav>
            );
        };

        // ---- HERO ----
        const Hero = () => {
            return (
                <section id="home" className="min-h-screen flex items-center justify-center gradient-bg bg-grid-pattern pt-20">
                    <div className="max-w-6xl mx-auto px-6 py-16 md:py-24 w-full">
                        <div className="grid md:grid-cols-2 gap-12 items-center">
                            <div className="order-2 md:order-1">
                                <div className="inline-flex items-center gap-2 bg-cyan-500/10 border border-cyan-500/20 rounded-full px-4 py-1.5 mb-6">
                                    <span className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
                                    <span className="text-sm text-cyan-300 font-medium">1st Year | IS Student</span>
                                </div>

                                <h1 className="text-4xl sm:text-5xl md:text-6xl font-extrabold leading-tight tracking-tight">
                                    <span className="text-white">Hi, I'm </span>
                                    <span className="hero-gradient-text">Amila Vajira</span>
                                    <span className="text-white">.</span>
                                    <br />
                                    <span className="hero-gradient-text">Future Analytics Engineer</span>
                                </h1>

                                <p className="text-gray-400 text-base sm:text-lg mt-5 max-w-lg leading-relaxed">
                                    Information Systems undergraduate at Sabaragamuwa University. 
                                    Passionate about Data Engineering, Business Analysis & Analytics.
                                </p>

                                <div className="flex flex-wrap gap-4 mt-8">
                                    <a
                                        href="#projects"
                                        className="btn-primary text-white px-7 py-3.5 rounded-full text-sm font-semibold inline-flex items-center gap-2"
                                    >
                                        View My Work
                                        <i className="fas fa-arrow-right text-xs"></i>
                                    </a>
                                    <a
                                        href="#contact"
                                        className="glass text-white/80 hover:text-white px-7 py-3.5 rounded-full text-sm font-medium inline-flex items-center gap-2 border border-cyan-500/20 hover:border-cyan-400/50 transition-all"
                                    >
                                        <i className="fas fa-paper-plane"></i>
                                        Let's Connect
                                    </a>
                                </div>

                                <div className="flex gap-4 mt-8">
                                    <a href="https://github.com/Amila999-cell" target="_blank" className="social-link w-11 h-11 rounded-full flex items-center justify-center text-gray-400 hover:text-white">
                                        <i className="fab fa-github text-lg"></i>
                                    </a>
                                    <a href="https://linkedin.com" target="_blank" className="social-link w-11 h-11 rounded-full flex items-center justify-center text-gray-400 hover:text-white">
                                        <i className="fab fa-linkedin-in text-lg"></i>
                                    </a>
                                    <a href="#" className="social-link w-11 h-11 rounded-full flex items-center justify-center text-gray-400 hover:text-white">
                                        <i className="fab fa-twitter text-lg"></i>
                                    </a>
                                </div>
                            </div>

                            <div className="order-1 md:order-2 flex justify-center">
                                <div className="relative">
                                    <div className="absolute inset-0 rounded-full bg-cyan-500/20 blur-3xl -z-10 scale-150 pulse-glow"></div>
                                    <div className="relative w-64 h-64 sm:w-80 sm:h-80 md:w-96 md:h-96 rounded-full overflow-hidden border-2 border-cyan-500/30 shadow-2xl shadow-cyan-500/10 float-animation">
                                        <div className="w-full h-full bg-gradient-to-br from-cyan-900/30 via-blue-900/20 to-indigo-900/30 flex items-center justify-center">
                                            <div className="text-8xl sm:text-9xl text-white/20 font-light">👨‍🎓</div>
                                        </div>
                                        <div className="absolute inset-0 rounded-full border border-white/5"></div>
                                    </div>
                                    <div className="absolute -bottom-2 -right-2 glass px-4 py-2 rounded-full border border-cyan-500/20">
                                        <span className="text-xs font-medium text-white/80">
                                            <i className="fas fa-graduation-cap text-cyan-400 mr-1.5"></i>
                                            1st Year
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="flex justify-center mt-16 md:mt-20">
                            <a
                                href="#about"
                                className="text-gray-500 hover:text-gray-300 transition-colors flex flex-col items-center gap-2 text-sm"
                            >
                                <span>Scroll</span>
                                <i className="fas fa-chevron-down animate-bounce text-xs"></i>
                            </a>
                        </div>
                    </div>
                </section>
            );
        };

        // ---- ABOUT ----
        const About = () => {
            return (
                <section id="about" className="py-20 md:py-28 gradient-bg bg-grid-pattern">
                    <div className="max-w-6xl mx-auto px-6">
                        <div className="flex flex-col md:flex-row gap-12 md:gap-20 items-center">
                            <div className="md:w-5/12">
                                <div className="relative">
                                    <div className="absolute -top-6 -left-6 w-24 h-24 border border-cyan-500/20 rounded-xl"></div>
                                    <div className="absolute -bottom-6 -right-6 w-32 h-32 border border-blue-500/20 rounded-xl"></div>
                                    <div className="relative glass rounded-2xl p-6 border border-cyan-500/10 overflow-hidden">
                                        <div className="aspect-[4/3] rounded-xl bg-gradient-to-br from-cyan-900/20 via-blue-900/10 to-indigo-900/20 flex items-center justify-center">
                                            <div className="text-7xl opacity-30">📊</div>
                                        </div>
                                        <div className="absolute bottom-4 right-4 glass px-3 py-1.5 rounded-full border border-cyan-500/20 text-xs text-white/60">
                                            <i className="fas fa-chart-line mr-1.5 text-cyan-400"></i> Analytics Enthusiast
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="md:w-7/12">
                                <span className="text-cyan-400 font-medium text-sm tracking-widest uppercase">About Me</span>
                                <h2 className="text-3xl sm:text-4xl font-bold text-white mt-2">
                                    Information Systems <br className="hidden sm:block" />
                                    <span className="hero-gradient-text">Undergraduate</span>
                                </h2>
                                <p className="text-gray-400 text-base leading-relaxed mt-5">
                                    I'm a 1st-year Information Systems undergraduate at Sabaragamuwa University of Sri Lanka. 
                                    I completed my A/Ls in the Physical Science stream with CCC results, which gave me a strong 
                                    foundation in analytical thinking and problem-solving.
                                </p>
                                <p className="text-gray-400 text-base leading-relaxed mt-3">
                                    I'm passionate about Data Engineering, Business Analysis, and Analytics. 
                                    I aspire to become a skilled Analytics Engineer who bridges the gap between raw data 
                                    and actionable business insights. I'm continuously learning and building my skills 
                                    in data processing, analytics, and business intelligence.
                                </p>

                                <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 mt-8">
                                    {[
                                        { label: 'University', value: '1st Year' },
                                        { label: 'A/L Stream', value: 'Physical Science' },
                                        { label: 'A/L Results', value: 'CCC' },
                                    ].map((stat) => (
                                        <div key={stat.label} className="glass rounded-xl p-4 border border-cyan-500/10 text-center">
                                            <div className="text-sm font-bold hero-gradient-text">{stat.value}</div>
                                            <div className="text-xs text-gray-400 mt-0.5">{stat.label}</div>
                                        </div>
                                    ))}
                                </div>

                                <div className="mt-4 flex flex-wrap gap-2">
                                    <span className="text-xs text-cyan-400 bg-cyan-500/10 px-3 py-1 rounded-full border border-cyan-500/20">
                                        <i className="fas fa-calculator mr-1"></i> Combined Maths
                                    </span>
                                    <span className="text-xs text-cyan-400 bg-cyan-500/10 px-3 py-1 rounded-full border border-cyan-500/20">
                                        <i className="fas fa-flask mr-1"></i> Physics
                                    </span>
                                    <span className="text-xs text-cyan-400 bg-cyan-500/10 px-3 py-1 rounded-full border border-cyan-500/20">
                                        <i className="fas fa-atom mr-1"></i> Chemistry
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // ---- SKILLS ----
        const Skills = () => {
            const skillCategories = [
                {
                    title: 'Data & Analytics',
                    icon: 'fa-database',
                    skills: ['Python', 'SQL', 'Power BI', 'Tableau', 'Excel', 'Data Visualization', 'Analytics'],
                },
                {
                    title: 'Business Analysis',
                    icon: 'fa-chart-line',
                    skills: ['Requirements Gathering', 'Process Modeling', 'SWOT Analysis', 'Agile', 'JIRA'],
                },
                {
                    title: 'Tools & Technologies',
                    icon: 'fa-code',
                    skills: ['Git', 'VS Code', 'MySQL', 'PostgreSQL', 'Linux'],
                },
            ];

            return (
                <section id="skills" className="py-20 md:py-28 gradient-bg">
                    <div className="max-w-6xl mx-auto px-6">
                        <div className="text-center max-w-2xl mx-auto mb-14">
                            <span className="text-cyan-400 font-medium text-sm tracking-widest uppercase">Skills</span>
                            <h2 className="text-3xl sm:text-4xl font-bold text-white mt-2">
                                My <span className="hero-gradient-text">Skills</span>
                            </h2>
                            <p className="text-gray-400 text-base mt-4 leading-relaxed">
                                Tools and technologies I'm currently learning and working with.
                            </p>
                        </div>

                        <div className="grid md:grid-cols-3 gap-6">
                            {skillCategories.map((cat) => (
                                <div key={cat.title} className="glass rounded-2xl p-6 border border-cyan-500/10 hover:border-cyan-500/30 transition-all duration-300">
                                    <div className="flex items-center gap-3 mb-5">
                                        <div className="w-10 h-10 rounded-full bg-cyan-500/10 flex items-center justify-center text-cyan-400">
                                            <i className={`fas ${cat.icon} text-lg`}></i>
                                        </div>
                                        <h3 className="text-lg font-semibold text-white">{cat.title}</h3>
                                    </div>
                                    <div className="flex flex-wrap gap-2.5">
                                        {cat.skills.map((skill) => (
                                            <span key={skill} className="skill-tag text-sm text-gray-300 px-4 py-2 rounded-full">
                                                {skill}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="mt-10 flex flex-wrap justify-center gap-3 opacity-70">
                            {['Python', 'SQL', 'Pandas', 'NumPy', 'Matplotlib', 'Power BI', 'Excel', 'ETL', 'Data Warehousing', 'Analytics'].map(
                                (s) => (
                                    <span key={s} className="text-sm text-gray-500 bg-white/5 px-4 py-1.5 rounded-full border border-cyan-500/10">
                                        {s}
                                    </span>
                                )
                            )}
                        </div>
                    </div>
                </section>
            );
        };

        // ---- PROJECTS ----
        const Projects = () => {
            const projects = [
                {
                    title: 'Python Calculator',
                    desc: 'A simple calculator with GUI built using Python and Tkinter. Supports addition, subtraction, multiplication, division, and modulus operations with error handling.',
                    tech: ['Python', 'Tkinter', 'GUI'],
                    icon: 'fa-calculator',
                    link: 'https://github.com/Amila999-cell/python-calculator',
                },
                {
                    title: 'Student Performance Analytics',
                    desc: 'A dashboard to analyze student performance data and identify patterns using Python and Power BI.',
                    tech: ['Python', 'Power BI', 'Pandas'],
                    icon: 'fa-chart-simple',
                    link: '#',
                },
                {
                    title: 'University Event Management System',
                    desc: 'A web-based system to manage university events, registrations, and feedback.',
                    tech: ['Web Development', 'Database', 'UI/UX'],
                    icon: 'fa-calendar-check',
                    link: '#',
                },
                {
                    title: 'Data Visualization Tool for Business',
                    desc: 'An interactive dashboard for businesses to visualize sales and customer data.',
                    tech: ['Power BI', 'Excel', 'Data Modeling'],
                    icon: 'fa-chart-line',
                    link: '#',
                },
                {
                    title: 'Inventory Management System',
                    desc: 'Developed a simple inventory management system using Python and SQLite.',
                    tech: ['Python', 'SQLite', 'CRUD'],
                    icon: 'fa-cubes',
                    link: '#',
                },
                {
                    title: 'Market Research Analysis',
                    desc: 'Conducted market research analysis using survey data to identify customer preferences.',
                    tech: ['Excel', 'Survey Design', 'Reporting'],
                    icon: 'fa-magnifying-glass-chart',
                    link: '#',
                },
            ];

            return (
                <section id="projects" className="py-20 md:py-28 gradient-bg bg-grid-pattern">
                    <div className="max-w-6xl mx-auto px-6">
                        <div className="text-center max-w-2xl mx-auto mb-14">
                            <span className="text-cyan-400 font-medium text-sm tracking-widest uppercase">Portfolio</span>
                            <h2 className="text-3xl sm:text-4xl font-bold text-white mt-2">
                                My <span className="hero-gradient-text">Projects</span>
                            </h2>
                            <p className="text-gray-400 text-base mt-4 leading-relaxed">
                                Academic and personal projects showcasing my skills and learning journey.
                            </p>
                        </div>

                        <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
                            {projects.map((p) => (
                                <div key={p.title} className="project-card rounded-2xl p-6 group">
                                    <div className="icon-wrap w-12 h-12 rounded-xl flex items-center justify-center text-cyan-400 text-xl mb-4">
                                        <i className={`fas ${p.icon}`}></i>
                                    </div>
                                    <h3 className="text-xl font-bold text-white group-hover:text-cyan-300 transition-colors">

                                    <p className="text-gray-400 text-sm leading-relaxed mt-2">{p.desc}</p>
                                    <div className="flex flex-wrap gap-2 mt-4">
                                        {p.tech.map((t) => (
                                            <span key={t} className="text-xs text-gray-400 bg-white/5 px-3 py-1 rounded-full border border-cyan-500/10">
                                                {t}
                                            </span>
                                        ))}
                                    </div>
                                    <div className="mt-5 pt-4 border-t border-cyan-500/10 flex justify-between items-center">
                                        <span className="text-xs text-gray-500">
                                            {p.link && p.link !== '#' ? (
                                                <a href={p.link} target="_blank" className="text-cyan-400 hover:text-cyan-300 transition-colors">
                                                    <i className="fab fa-github mr-1"></i> View on GitHub
                                                </a>
                                            ) : (
                                                'Coming Soon'
                                            )}
                                        </span>
                                        {p.link && p.link !== '#' && (
                                            <a href={p.link} target="_blank" className="text-cyan-400 hover:text-cyan-300 transition-colors text-sm">
                                                <i className="fas fa-arrow-right"></i>
                                            </a>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // ---- CONTACT (with Telegram Integration) ----
        const Contact = () => {
            const [formData, setFormData] = useState({ name: '', email: '', message: '' });
            const [loading, setLoading] = useState(false);
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });

            const handleChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };

            // --- TELEGRAM CONFIGURATION ---
            const TELEGRAM_BOT_TOKEN = '8546791642:AAHsIZiKKd-9N14DnLnJsA7nWJ3_rbCaReQ';
            const TELEGRAM_CHAT_ID = '7885063642';

            const sendToTelegram = async (name, email, message) => {
                const text = `📩 *New Portfolio Message!*\n\n👤 *Name:* ${name}\n📧 *Email:* ${email}\n💬 *Message:* ${message}\n\n📱 *From:* Portfolio Website`;
                
                const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: text,
                        parse_mode: 'Markdown',
                    }),
                });
                
                return response.json();
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                
                if (!formData.name || !formData.email || !formData.message) {
                    setToast({
                        show: true,
                        message: 'Please fill in all fields!',
                        type: 'error'
                    });
                    setTimeout(() => setToast({ ...toast, show: false }), 4000);
                    return;
                }

                setLoading(true);

                try {
                    const result = await sendToTelegram(
                        formData.name,
                        formData.email,
                        formData.message
                    );

                    if (result.ok) {
                        setToast({
                            show: true,
                            message: '✅ Message sent successfully! I\'ll get back to you soon.',
                            type: 'success'
                        });
                        setFormData({ name: '', email: '', message: '' });
                    } else {
                        setToast({
                            show: true,
                            message: '❌ Failed to send message. Please try again later.',
                            type: 'error'
                        });
                    }
                } catch (error) {
                    setToast({
                        show: true,
                        message: '❌ Network error. Please check your connection.',
                        type: 'error'
                    });
                }

                setLoading(false);
                setTimeout(() => setToast({ ...toast, show: false }), 4000);
            };

            return (
                <section id="contact" className="py-20 md:py-28 gradient-bg">
                    <div className="max-w-5xl mx-auto px-6">
                        <Toast 
                            message={toast.message} 
                            type={toast.type} 
                            show={toast.show} 
                        />

                        <div className="text-center max-w-2xl mx-auto mb-14">
                            <span className="text-cyan-400 font-medium text-sm tracking-widest uppercase">Contact</span>
                            <h2 className="text-3xl sm:text-4xl font-bold text-white mt-2">
                                Let's <span className="hero-gradient-text">Connect</span>
                            </h2>
                            <p className="text-gray-400 text-base mt-4 leading-relaxed">
                                Send me a message and I'll get back to you on Telegram!
                            </p>
                        </div>

                        <div className="glass rounded-2xl p-6 md:p-10 border border-cyan-500/10">
                            <div className="grid md:grid-cols-5 gap-8">
                                <div className="md:col-span-2 space-y-6">
                                    <div>
                                        <h3 className="text-white font-semibold text-lg">Get in touch</h3>
                                        <p className="text-gray-400 text-sm mt-1 leading-relaxed">
                                            Fill the form and I'll reply on Telegram instantly!
                                        </p>
                                    </div>

                                    <div className="space-y-4">
                                        <div className="flex items-center gap-4 text-gray-300 text-sm">
                                            <div className="w-10 h-10 rounded-full bg-cyan-500/10 flex items-center justify-center text-cyan-400">
                                                <i className="fas fa-envelope"></i>
                                            </div>
                                            <span>amilawajira24@gmail.com</span>
                                        </div>
                                        <div className="flex items-center gap-4 text-gray-300 text-sm">
                                            <div className="w-10 h-10 rounded-full bg-cyan-500/10 flex items-center justify-center text-cyan-400">
                                                <i className="fas fa-map-marker-alt"></i>
                                            </div>
                                            <span>Nuwaraeliya, Sri Lanka</span>
                                        </div>
                                        <div className="flex items-center gap-4 text-gray-300 text-sm">
                                            <div className="w-10 h-10 rounded-full bg-cyan-500/10 flex items-center justify-center text-cyan-400">
                                                <i className="fab fa-telegram-plane"></i>
                                            </div>
                                            <span>@amila_vajira</span>
                                        </div>
                                        <div className="flex items-center gap-4 text-gray-300 text-sm">
                                            <div className="w-10 h-10 rounded-full bg-cyan-500/10 flex items-center justify-center text-cyan-400">
                                                <i className="fas fa-graduation-cap"></i>
                                            </div>
                                            <span>Sabaragamuwa University</span>
                                        </div>
                                    </div>

                                    <div className="flex gap-3 pt-2">
                                        <a href="https://github.com/Amila999-cell" target="_blank" className="social-link w-10 h-10 rounded-full flex items-center justify-center text-gray-400 hover:text-white">
                                            <i className="fab fa-github"></i>
                                        </a>
                                        <a href="https://linkedin.com" target="_blank" className="social-link w-10 h-10 rounded-full flex items-center justify-center text-gray-400 hover:text-white">
                                            <i className="fab fa-linkedin-in"></i>
                                        </a>
                                        <a href="#" className="social-link w-10 h-10 rounded-full flex items-center justify-center text-gray-400 hover:text-white">
                                            <i className="fab fa-twitter"></i>
                                        </a>
                                    </div>
                                </div>

                                <form onSubmit={handleSubmit} className="md:col-span-3 space-y-4">
                                    <div>
                                        <label className="text-sm text-gray-300 font-medium block mb-1.5">Your Name</label>
                                        <input
                                            type="text"
                                            name="name"
                                            value={formData.name}
                                            onChange={handleChange}
                                            placeholder="John Doe"
                                            className="input-field w-full px-4 py-3 rounded-xl text-sm"
                                            required
                                        />
                                    </div>
                                    <div>
                                        <label className="text-sm text-gray-300 font-medium block mb-1.5">Email Address</label>
                                        <input
                                            type="email"
                                            name="email"
                                            value={formData.email}
                                            onChange={handleChange}
                                            placeholder="john@example.com"
                                            className="input-field w-full px-4 py-3 rounded-xl text-sm"
                                            required
                                        />
                                    </div>
                                    <div>
                                        <label className="text-sm text-gray-300 font-medium block mb-1.5">Message</label>
                                        <textarea
                                            name="message"
                                            value={formData.message}
                                            onChange={handleChange}
                                            placeholder="Tell me about your project..."
                                            rows="4"
                                            className="input-field w-full px-4 py-3 rounded-xl text-sm resize-none"
                                            required
                                        ></textarea>
                                    </div>
                                    <button
                                        type="submit"
                                        disabled={loading}
                                        className={`btn-primary text-white px-8 py-3.5 rounded-full text-sm font-semibold w-full sm:w-auto inline-flex items-center justify-center gap-2 transition-all ${loading ? 'opacity-70 cursor-not-allowed' : ''
                                            }`}
                                    >
                                        {loading ? (
                                            <>
                                                <span className="spinner"></span>
                                                Sending...
                                            </>
                                        ) : (
                                            <>
                                                Send Message
                                                <i className="fas fa-paper-plane text-xs"></i>
                                            </>
                                        )}
                                    </button>
                                    <p className="text-xs text-gray-500 mt-2">
                                        <i className="fas fa-telegram text-cyan-400 mr-1"></i>
                                        Messages will be sent directly to my Telegram
                                    </p>
                                </form>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // ---- FOOTER ----
        const Footer = () => {
            const year = new Date().getFullYear();
            return (
                <footer className="border-t border-cyan-500/10 gradient-bg">
                    <div className="max-w-6xl mx-auto px-6 py-8 flex flex-col sm:flex-row items-center justify-between gap-4">
                        <p className="text-gray-500 text-sm">
                            &copy; {year} <span className="text-white/60 font-medium">Amila Vajira</span>.
                            Built with <i className="fas fa-heart text-rose-400 text-xs mx-1"></i> & React.
                        </p>
                        <div className="flex gap-5 text-sm text-gray-500">
                            <a href="#" className="hover:text-white transition-colors">Privacy</a>
                            <a href="#" className="hover:text-white transition-colors">Terms</a>
                            <a href="#home" className="hover:text-white transition-colors">
                                <i className="fas fa-arrow-up"></i>
                            </a>
                        </div>
                    </div>
                </footer>
            );
        };

        // ---- APP ----
        const App = () => {
            return (
                <div className="min-h-screen bg-[#0c0e1a] text-white">
                    <Navbar />
                    <Hero />
                    <About />
                    <Skills />
                    <Projects />
                    <Contact />
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js">
    </script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js">
    </script>

</body>
</html>
